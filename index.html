<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Prompt Generator</title>
    <!-- เรียกใช้ Tailwind CSS แบบ CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-4 flex justify-center items-start pt-10">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-lg w-full">
        <h2 class="text-2xl md:text-3xl font-bold text-center text-blue-600 mb-6">
            🎨 สร้าง Prompt ภาพแนวตั้ง
        </h2>

        <!-- ส่วนตั้งค่า API Key -->
        <div class="bg-blue-50 p-4 rounded-xl mb-6 border border-blue-100">
            <label class="block text-sm font-semibold text-blue-800 mb-2">🔑 Gemini API Key</label>
            <input type="password" id="apiKey" 
                class="w-full px-4 py-2 rounded-lg border border-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                placeholder="วาง API Key ของคุณที่นี่..." onchange="saveApiKey()">
            <p class="text-xs text-blue-600 mt-2">
                * ระบบจะจำค่าไว้ในเครื่องของคุณ (ไม่ต้องวางในโค้ดแล้ว ปลอดภัยกว่าการเอาขึ้น GitHub ตรงๆ)
            </p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block font-semibold mb-1">1. อยากสร้างภาพอะไร?</label>
                <input type="text" id="q1" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="เช่น แมวส้ม, หุ่นยนต์, ผู้ชายใส่สูท">
            </div>
            <div>
                <label class="block font-semibold mb-1">2. กำลังทำอะไร?</label>
                <input type="text" id="q2" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="เช่น แทงสนุ๊กเกอร์, ดื่มกาแฟ">
            </div>
            <div>
                <label class="block font-semibold mb-1">3. ฉากหลังเป็นอะไร?</label>
                <input type="text" id="q3" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="เช่น เพื่อนแมวถือไม้คิว, คาเฟ่สไตล์มินิมอล">
            </div>

            <button id="submitBtn" onclick="generatePrompt()" 
                class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md flex justify-center items-center gap-2 disabled:bg-slate-400 disabled:cursor-not-allowed">
                <span>✨</span> สร้าง Prompt เลย
            </button>
        </div>

        <!-- ส่วนแสดงผลลัพธ์ -->
        <div id="resultBox" class="hidden mt-6 relative group">
            <div class="bg-slate-800 text-green-400 p-4 rounded-xl font-mono text-sm whitespace-pre-wrap border border-slate-700 min-h-[100px]" id="resultText">
            </div>
            <button onclick="copyText()" 
                class="absolute top-2 right-2 bg-slate-600 hover:bg-slate-500 text-white text-xs px-3 py-1.5 rounded-md transition opacity-80 group-hover:opacity-100 shadow">
                Copy
            </button>
        </div>
    </div>

    <script>
        // โหลด API Key จาก LocalStorage เมื่อเปิดเว็บ
        window.onload = function() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('apiKey').value = savedKey;
            }
        };

        // บันทึก API Key ลง LocalStorage
        function saveApiKey() {
            const key = document.getElementById('apiKey').value.trim();
            localStorage.setItem('gemini_api_key', key);
        }

        async function generatePrompt() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const q1 = document.getElementById('q1').value.trim();
            const q2 = document.getElementById('q2').value.trim();
            const q3 = document.getElementById('q3').value.trim();
            
            const btn = document.getElementById('submitBtn');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');

            if (!apiKey) {
                alert('กรุณาใส่ API Key ก่อนครับ (รับฟรีได้ที่ Google AI Studio)');
                document.getElementById('apiKey').focus();
                return;
            }

            if (!q1 || !q2 || !q3) {
                alert('กรุณากรอกข้อมูลให้ครบทั้ง 3 ข้อครับ');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                กำลังใช้พลัง AI...
            `;
            resultBox.classList.remove('hidden');
            resultText.classList.remove('text-green-400', 'text-red-400');
            resultText.classList.add('text-slate-300');
            resultText.innerText = 'กำลังประมวลผล...';

            // Prompt พื้นหลังที่สั่งให้ Gemini ทำงาน
            const systemInstruction = `You are an expert prompt engineer for AI image generators (like Midjourney, Stable Diffusion).
            Please create a highly detailed, professional, and descriptive English prompt based on these inputs:
            1. Subject: ${q1}
            2. Action: ${q2}
            3. Background/Environment: ${q3}
            
            Requirements:
            - Add photography terms like cinematic lighting, 8k resolution, highly detailed, photorealistic.
            - Ensure the composition looks professional.
            - Output ONLY the English prompt text. Do not add any conversational text or explanations.
            - End the prompt with EXACTLY: --ar 9:16`;

            // อัปเดตชื่อโมเดลเป็น gemini-3-flash-preview ตามที่คุณแจ้งมา
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemInstruction }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    resultText.classList.add('text-red-400');
                    resultText.innerText = `Error: ${data.error.message}`;
                } else {
                    const generatedPrompt = data.candidates[0].content.parts[0].text;
                    resultText.classList.add('text-green-400');
                    resultText.innerText = generatedPrompt.trim();
                }

            } catch (error) {
                resultText.classList.add('text-red-400');
                resultText.innerText = `เกิดข้อผิดพลาดในการเชื่อมต่อ: ${error.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>✨</span> สร้าง Prompt เลย';
            }
        }

        function copyText() {
            const text = document.getElementById('resultText').innerText;
            if(text.includes('กำลังประมวลผล') || text.includes('Error')) return;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.absolute.top-2');
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.replace('bg-slate-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-600', 'bg-slate-600');
                }, 2000);
            });
        }
    </script>
</body>
</html>
