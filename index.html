<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Prompt Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1557b0;
        }
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f0fe;
            border-left: 5px solid #1a73e8;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            display: none;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            width: auto;
            margin-top: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎨 สร้าง Prompt ภาพแนวตั้ง</h2>
    
    <div class="form-group">
        <label>1. อยากสร้างภาพอะไร?</label>
        <input type="text" id="q1" placeholder="เช่น ผู้ชายใส่สูท, หุ่นยนต์, แมว">
    </div>
    <div class="form-group">
        <label>2. กำลังทำอะไร?</label>
        <input type="text" id="q2" placeholder="เช่น กำลังพรีเซนต์งาน, ดื่มกาแฟ">
    </div>
    <div class="form-group">
        <label>3. ฉากหลังเป็นอะไร?</label>
        <input type="text" id="q3" placeholder="เช่น ออฟฟิศสุดล้ำ, คาเฟ่สไตล์มินิมอล">
    </div>

    <button id="submitBtn" onclick="generatePrompt()">✨ สร้าง Prompt เลย</button>

    <div class="result-box" id="resultBox">
        <button class="copy-btn" onclick="copyText()">Copy</button>
        <div id="resultText"></div>
    </div>
</div>

<script>
    // ⚠️ เอา API Key จาก Google AI Studio มาใส่ตรงนี้
    const GEMINI_API_KEY = 'AIzaSyCnq7firAQUPY4LrpWr0pw_-V4NltB62aQ'; 

    async function generatePrompt() {
        const q1 = document.getElementById('q1').value.trim();
        const q2 = document.getElementById('q2').value.trim();
        const q3 = document.getElementById('q3').value.trim();
        const btn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');

        if (!q1 || !q2 || !q3) {
            alert('กรุณากรอกข้อมูลให้ครบทั้ง 3 ข้อครับ');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'กำลังใช้พลัง AI คิด Prompt... ⏳';
        resultBox.style.display = 'block';
        resultText.innerText = 'กำลังประมวลผล...';

        // คำสั่งที่จะส่งไปหลอกล่อให้ Gemini เขียน Prompt ที่ดีที่สุดออกมา
        const systemInstruction = `คุณคือผู้เชี่ยวชาญด้านการเขียน Prompt สำหรับ AI สร้างภาพ (เช่น Midjourney, Stable Diffusion) 
        จงนำข้อมูลต่อไปนี้ไปเขียนเป็น Prompt ภาษาอังกฤษที่สละสลวย มีรายละเอียดครบถ้วน แสงเงาสวยงาม 
        และต้องเป็นภาพแนวตั้ง (Vertical) โดยลงท้าย Prompt ด้วย --ar 9:16
        
        ข้อมูลจากผู้ใช้:
        1. Subject: ${q1}
        2. Action: ${q2}
        3. Background: ${q3}
        
        ตอบกลับมาแค่ตัว Prompt ภาษาอังกฤษเท่านั้น ไม่ต้องมีคำอธิบายหรือคำทักทายใดๆ`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: systemInstruction }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                resultText.innerText = `Error: ${data.error.message}`;
            } else {
                const generatedPrompt = data.candidates[0].content.parts[0].text;
                resultText.innerText = generatedPrompt.trim();
            }

        } catch (error) {
            resultText.innerText = `เกิดข้อผิดพลาดในการเชื่อมต่อ: ${error}`;
        } finally {
            btn.disabled = false;
            btn.innerText = '✨ สร้าง Prompt เลย';
        }
    }

    function copyText() {
        const text = document.getElementById('resultText').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('คัดลอก Prompt แล้ว! นำไปใช้สร้างภาพได้เลยครับ');
        });
    }
</script>

</body>
</html>
